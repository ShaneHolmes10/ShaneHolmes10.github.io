      - company: SS Innovations (Formerly AVRA Medical Robotics)
        position: Computer / Robotics / Software Engineer
        location: Orlando, FL
        start_date: 2022-05
        end_date: 2022-09
        highlights:
          - Worked on the computer vision sensor system for a surgical robot arm to identify facial landmarks
          - Achieved accurate simulation test results for surgical motion and object identification
          - "Technologies: Python, OpenCV, Git"

      - company: Advanced Mobility Institute
        position: Research Assistant / Robotics & Software Engineer
        location: Lake Wales, FL
        start_date: 2021-01
        end_date: 2022-01
        highlights:
          - Developed a fleet of small robot vehicles to autonomously navigate and coordinate in an environment
          - Built electrical motor interface systems and an ArUco sensor system to identify vehicles
          - Achieved vehicle convoy movement and dynamic obstacle avoidance of objects greater than 3 inches consistently
          - "Technologies: Python, C++/C, OpenCV"

    Projects:
      - name: Mock Rover — FSI Capstone Project
        url: /projects/fsi_rover/
        start_date: 2022-09
        end_date: 2023-05
        summary: Reverse-engineered and rebuilt a non-functional mock rover for the NASA Space Grant Consortium program through Florida Space Institute.
        highlights:
          - Led technical integration of embedded control systems designing a Raspberry Pi-based architecture coordinating four AC motors, stereoscopic camera feed, and wireless command interface
          - Achieved ~100ft wireless range, 300lb payload capacity, and 5mph traverse speed
          - "Technologies: Python, C++, Raspberry Pi, Arduino Uno, motor control systems, stereoscopic cameras, 3D printing"

      - name: Hand Robot — Commissioned Project
        url: /projects/hand_robot/
        start_date: 2020-11
        end_date: 2021-02
        summary: Designed and fabricated a fully articulated robotic hand with individual finger control and accompanying arm.
        highlights:
          - Iteratively designed hand and arm in CAD with custom 3D printed components
          - Engineered servo control circuits on Arduino platform for individual finger articulation
          - Developed desktop application in C++ for real-time articulation control
          - "Technologies: Arduino, C++, CAD, 3D printing, servo control systems"

      - name: 3D CPU Software Rasterizer
        url: /projects/3d_renderer/
        start_date: 2025-12
        summary: Built a 3D software rendering engine from first principles in C++ with no GPU acceleration or rendering libraries.
        highlights:
          - Full graphics pipeline — model space through screen space — implemented manually using 4x4 matrices
          - Triangle rasterization using edge functions and barycentric coordinates
          - Scene graph with hierarchical parent-child entity system and automatic world matrix propagation
          - "Technologies: C++, CMake, Eigen, SFML, CppUnitLite"

      - name: Latent Explorer
        url: /projects/latent_explorer/
        start_date: 2026-04
        summary: End-to-end tool for training and interactively visualizing the latent space of image datasets in the browser.
        highlights:
          - Trained a convolutional decoder on ~202k face images with PCA post-processing to surface principal axes of variation
          - Exported model to ONNX and built a pure-JavaScript browser interface running inference with no backend
          - "Technologies: PyTorch, ONNX Runtime Web, scikit-learn, HDF5, Vanilla JS"


